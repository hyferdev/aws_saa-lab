version: 0.0
os: linux
files:
  - source: apps/frontdesk
    destination: /opt/frontdesk
hooks:
  ApplicationStop:
    - location: scripts/codedeploy/stop.sh
      timeout: 30
      runas: root
  AfterInstall:
    - location: scripts/codedeploy/install.sh
      timeout: 120
      runas: root
  ApplicationStart:
    - location: scripts/codedeploy/start.sh
      timeout: 60
      runas: root
  ValidateService:
    - location: scripts/codedeploy/healthcheck.sh
      timeout: 30
      runas: root
